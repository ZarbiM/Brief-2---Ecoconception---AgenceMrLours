name: ecoindex-check
run-name: ${{github.actor}} is running ecoindex check
on: [workflow_dispatch]
jobs:
  launch-ecoindex-analysis:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # Chargement du contenu du repository
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      # Lancement de l'anaylse ecoindex via l'API
      - name: Launch analysis
        id: lauchAnalysis
        uses: fjogeleit/http-request-action@v1
        with:
          url: 'https://api.ecoindex.fr/v1/tasks/ecoindexes/'
          method: 'POST'
          data: '{"web_page": {"width": 1920, "height": 1080, "url": "https://agencelours-margot.surge.sh/"}, "custom_headers": {"Accept": "application/json"}}'

      # Délai d'attente pour laisser le temps à l'analyse de se faire
      - name: Sleep for 30 seconds
        run: sleep 120s
        shell: bash

      # Récupération des données de l'analyse avec l'id retournée à l'étape launchAnalysis
      - name: Get analysis result
        id: getAnalysis
        uses: fjogeleit/http-request-action@v1
        with:
          url: 'https://api.ecoindex.fr/v1/tasks/ecoindexes/${{fromJson(steps.lauchAnalysis.outputs.response)}}'
          method: 'GET'

      # Récupération de la date courante pour nommage du fichier
      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d')"

      # Création d'un fichier pour stocker l'analyse
      - name: Store analysis
        id: storeAnalysis
        uses: 1arp/create-a-file-action@0.4.6
        with:
          path: 'ecoindex'
          isAbsolutePath: 'false'
          file: ecoindex-analysis-${{steps.date.outputs.date}}.json
          content: ${{ steps.getAnalysis.outputs.response }}

      # Commit suite à la création du fichier
      - name: Auto commit
        uses: stefanzweifel/git-auto-commit-action@v7
    
